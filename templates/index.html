<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Diabetes Risk Assessment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== BACKGROUND ===== */

body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    color: white;
    overflow-x: hidden;

    background:
        linear-gradient(rgba(0,150,200,0.55), rgba(0,100,150,0.55)),
        url("https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=1600&q=80");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* ===== FLOATING MEDICAL ICONS ===== */

.medical-icons {
    position: fixed;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
}

.medical-icons span {
    position: absolute;
    font-size: 42px;
    opacity: 0.15;
    animation: floatIcons linear infinite;
}

.medical-icons span:nth-child(1){ left:10%; animation-duration:18s;}
.medical-icons span:nth-child(2){ left:25%; animation-duration:22s;}
.medical-icons span:nth-child(3){ left:40%; animation-duration:20s;}
.medical-icons span:nth-child(4){ left:60%; animation-duration:25s;}
.medical-icons span:nth-child(5){ left:75%; animation-duration:19s;}
.medical-icons span:nth-child(6){ left:85%; animation-duration:23s;}
.medical-icons span:nth-child(7){ left:50%; animation-duration:21s;}

@keyframes floatIcons {
    0% { transform: translateY(100vh) rotate(0deg); }
    100% { transform: translateY(-10vh) rotate(360deg); }
}

/* ===== NAVBAR ===== */

.navbar{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    z-index: 3;
}

/* ===== GLASS CARD ===== */

.glass-card{
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(18px);
    border-radius: 25px;
    padding: 45px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.4);

    width:100%;
    max-width:800px;
    margin:auto;

    position:relative;
    z-index:2;
}

/* ===== FORM ===== */

.form-control{
    background: rgba(255,255,255,0.25);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 12px;
    color:white;
}

.form-control:focus{
    background: rgba(255,255,255,0.35);
    border-color:#00ffff;
    box-shadow:0 0 12px rgba(0,255,255,0.8);
    color:white;
}

.form-label{
    font-weight:600;
}

.range-text{
    font-size:12px;
    opacity:0.8;
}

/* ===== BUTTON ===== */

.btn-modern{
    background: linear-gradient(135deg,#00eaff,#00ffcc);
    border:none;
    border-radius:30px;
    padding:12px 45px;
    font-size:18px;
    font-weight:700;
    transition:0.3s ease;
    color:black;
}

.btn-modern:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px rgba(0,255,255,1);
}

/* ===== TITLE ===== */

.title{
    font-weight:700;
}

/* ===== WRAPPER ===== */

.container-wrapper{
    padding-top:120px;
    padding-bottom:60px;
}

/* ================= MOBILE RESPONSIVE ================= */

@media (max-width:768px){

.container-wrapper{
    padding-top:100px;
    padding-left:15px;
    padding-right:15px;
}

.glass-card{
    padding:25px;
    border-radius:20px;
}

.title{
    font-size:22px;
}

.form-label{
    font-size:14px;
}

.range-text{
    font-size:11px;
}

.btn-modern{
    width:100%;
    font-size:16px;
}

.medical-icons span{
    font-size:28px;
}

}

</style>
</head>

<body>

<!-- Floating Icons -->
<div class="medical-icons">
<span>💊</span>
<span>🩺</span>
<span>🧬</span>
<span>❤️</span>
<span>🏥</span>
<span>🧪</span>
<span>💉</span>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">

<div class="container-fluid">

<a class="navbar-brand text-white fw-bold">
🤖 AI Diabetes Prediction System
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="menu">

<span class="me-3 fw-semibold text-white">
{{ session.get('user') }}
</span>

<a href="{{ url_for('logout') }}" class="btn btn-light btn-sm fw-semibold">
Logout
</a>

</div>
</div>
</nav>

<!-- MAIN CONTENT -->

<div class="container container-wrapper">

<div class="row justify-content-center">

<div class="glass-card">

<div class="text-center mb-4">
<h2 class="title">🧬 AI Clinical Risk Assessment</h2>
<p class="opacity-75">
Enter medical parameters for advanced ML-based prediction
</p>
</div>

<form action="/predict" method="post">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Pregnancies</label>
<input type="number" name="Pregnancies" class="form-control" min="0" max="20" required>
<div class="range-text">Range: 0 – 20</div>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Glucose (mg/dL)</label>
<input type="number" name="Glucose" class="form-control" min="50" max="300" required>
<div class="range-text">Range: 0 – 300</div>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Blood Pressure (mm Hg)</label>
<input type="number" name="BloodPressure" class="form-control" min="40" max="180" required>
<div class="range-text">Range: 60 – 140</div>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Skin Thickness (mm)</label>
<input type="number" name="SkinThickness" class="form-control" min="5" max="60" required>
<div class="range-text">Range: 10 – 100</div>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Insulin (µU/ml)</label>
<input type="number" name="Insulin" class="form-control" min="0" max="900" required>
<div class="range-text">Range: 0 – 300</div>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">BMI</label>
<input type="number" name="BMI" class="form-control" min="10" max="70" step="0.1" required>
<div class="range-text">Range: 18 – 45</div>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Age</label>
<input type="number" name="Age" class="form-control" min="10" max="100" required>
<div class="range-text">Range: 10 – 100</div>
</div>

</div>

<div class="text-center mt-4">
<button type="submit" class="btn btn-modern">
🚀 Analyze Risk
</button>
</div>

</form>

</div>
</div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
